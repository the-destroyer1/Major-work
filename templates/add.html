{% extends "base.html" %} {% block title %}Add Item{% endblock %} {% block
content %}
<div class="container py-4 surf-form">
  <h1 class="surf-heading">Add New Item To Database</h1>

  <form method="post" class="row g-3">
    <div class="col-12 col-md-6">
      <input
        class="form-control surf-input"
        type="text"
        name="title"
        placeholder="Title"
        required
      />
    </div>

    <div class="col-12 col-md-6">
      <input
        class="form-control surf-input"
        type="text"
        name="item_type"
        placeholder="Item Type"
        required
      />
    </div>

    <div class="col-12">
      <input
        class="form-control surf-input"
        type="text"
        name="description"
        placeholder="Description"
        required
      />
    </div>

    <div class="col-12 col-md-4">
      <input
        class="form-control surf-input"
        type="text"
        name="size"
        placeholder="Size"
        required
      />
    </div>

    <div class="col-12 col-md-4">
      <input
        class="form-control surf-input"
        type="number"
        step="0.5"
        name="price"
        placeholder="Price"
        required
      />
    </div>

    <div class="col-12 col-md-4">
      <input
        class="form-control surf-input"
        type="text"
        name="colour"
        placeholder="Colour"
        required
      />
    </div>

    <div class="col-12">
      <input
        class="form-control surf-input"
        type="text"
        name="image"
        placeholder="Image URL"
        required
      />
    </div>

    <div class="col-12">
      <button class="btn surf-btn" type="submit">Add Item</button>
    </div>
  </form>

  <p class="mt-3">{{ item }}</p>
</div>
{% endblock %} {% block page_styles %}
<style>
  /* Retro surf aesthetic */


  .surf-heading {
    text-align: center;
    font-size: 2.5rem;
    color: #fffbe6;
    text-shadow: 2px 2px #ffffff;
    margin-bottom: 1.5rem;
  }

  .surf-form {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 15px;
    padding: 2rem;
    backdrop-filter: blur(6px);
  }

  .surf-input {
    border: 2px solid #ca4b2b;
    border-radius: 10px;
    background-color: #fffbe6;
    color: #ffffff;
    font-family: "Comic Sans MS";
    transition: transform 0.2s ease;
  }

  .surf-input:focus {
    transform: scale(1.05);
    border-color: #ffffff;
    box-shadow: 0 0 10px #000000;
  }

  .surf-btn {
    background: #ffffff;
    color: #000000;
    font-size: 1.2rem;
    border-radius: 25px;
    padding: 0.6rem 1.5rem;
    border: none;
    transition: background 0.3s ease, transform 0.2s ease;
  }

  .surf-btn:hover {
    background: #4b4b4b;
    transform: scale(1.1);
  }
  footer {
    margin-top: 500px;
  }
</style>
{% endblock %}
